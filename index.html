<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar Lotniczy</title>
<style>
  body { font-family: monospace; background: #fff; color: #000; padding: 20px; max-width: 500px; margin: 0 auto; }
  #status { font-size: 12px; color: #888; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 8px 4px; border-bottom: 1px solid #eee; font-size: 14px; }
  td:first-child { color: #888; font-size: 11px; width: 130px; }
  #r-callsign { font-size: 36px; font-weight: bold; letter-spacing: 3px; }
  #error { color: red; font-size: 12px; margin-top: 10px; }
</style>
</head>
<body>
<div id="status">Ładowanie...</div>
<table id="tbl" style="display:none">
  <tr><td>NR LOTU</td><td id="r-callsign"></td></tr>
  <tr><td>Linia lotnicza</td><td id="r-airline"></td></tr>
  <tr><td>Typ samolotu</td><td id="r-type"></td></tr>
  <tr><td>Wysokość</td><td id="r-alt"></td></tr>
  <tr><td>Prędkość</td><td id="r-spd"></td></tr>
  <tr><td>Kurs</td><td id="r-hdg"></td></tr>
  <tr><td>Odległość</td><td id="r-dist"></td></tr>
  <tr><td>Rejestracja</td><td id="r-reg"></td></tr>
  <tr><td>ICAO</td><td id="r-icao"></td></tr>
</table>
<div id="error"></div>

<script>
const LAT = 51.141866533668555;
const LON = 17.148976627342574;
const DIST_NM = 100;

const AIRLINES = {
  LOT:'LOT Polish Airlines', LH:'Lufthansa', FR:'Ryanair', W6:'Wizz Air',
  EW:'Eurowings', BA:'British Airways', AF:'Air France', KL:'KLM',
  U2:'easyJet', OS:'Austrian', TK:'Turkish Airlines', QR:'Qatar Airways',
  EK:'Emirates', LX:'Swiss', RYR:'Ryanair', DLH:'Lufthansa',
  WZZ:'Wizz Air', EZY:'easyJet', THY:'Turkish Airlines', UAE:'Emirates',
};

const TYPES = {
  B738:'Boeing 737-800', B739:'Boeing 737-900', B737:'Boeing 737',
  B744:'Boeing 747-400', B788:'Boeing 787-8', B789:'Boeing 787-9',
  A319:'Airbus A319', A320:'Airbus A320', A321:'Airbus A321',
  A20N:'Airbus A320neo', A21N:'Airbus A321neo', A19N:'Airbus A319neo',
  A332:'Airbus A330-200', A333:'Airbus A330-300', A359:'Airbus A350-900',
  E190:'Embraer E190', E195:'Embraer E195', AT72:'ATR 72', DH8D:'Dash 8 Q400',
};

function deg2rad(d){ return d*Math.PI/180; }
function distKm(lat1,lon1,lat2,lon2){
  const R=6371, dLat=deg2rad(lat2-lat1), dLon=deg2rad(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function airline(cs){
  if(!cs) return '–';
  const k = cs.trim().replace(/\d/g,'').toUpperCase();
  return AIRLINES[k] || AIRLINES[cs.trim().slice(0,3).toUpperCase()] || '–';
}
function actype(t){ return t ? (TYPES[t.toUpperCase()] || t.toUpperCase()) : '–'; }
function set(id, val){ document.getElementById(id).textContent = val || '–'; }

async function fetchFlights(){
  document.getElementById('error').textContent = '';
  const target = `https://opendata.adsb.fi/api/v2/lat/${LAT}/lon/${LON}/dist/${DIST_NM}`;
  const url = `https://corsproxy.io/?${encodeURIComponent(target)}`;
  try {
    const r = await fetch(url);
    if(!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const list = (data.ac || [])
      .filter(a => a.lat != null && a.lon != null && a.alt_baro !== 'ground')
      .map(a => ({...a, _d: distKm(LAT, LON, a.lat, a.lon)}))
      .sort((a,b) => a._d - b._d);

    if(list.length === 0){
      document.getElementById('status').textContent = 'Brak samolotów w zasięgu · ' + new Date().toLocaleTimeString('pl-PL');
      document.getElementById('tbl').style.display = 'none';
      return;
    }

    const a = list[0];
    const cs = (a.flight||'').trim() || a.hex || '–';
    const alt_m = a.alt_baro && a.alt_baro !== 'ground' ? Math.round(a.alt_baro * 0.3048) + ' m' : '–';
    const spd = a.gs ? Math.round(a.gs * 1.852) + ' km/h' : '–';

    set('r-callsign', cs);
    set('r-airline', airline(cs));
    set('r-type', actype(a.t));
    set('r-alt', alt_m);
    set('r-spd', spd);
    set('r-hdg', a.track != null ? Math.round(a.track) + '°' : '–');
    set('r-dist', a._d.toFixed(1) + ' km');
    set('r-reg', a.r);
    set('r-icao', (a.hex||'').toUpperCase());

    document.getElementById('tbl').style.display = 'table';
    document.getElementById('status').textContent = 'Najbliższy z ' + list.length + ' samolotów · ' + new Date().toLocaleTimeString('pl-PL');
  } catch(e) {
    document.getElementById('error').textContent = 'Błąd: ' + e.message;
  }
}

fetchFlights();
setInterval(fetchFlights, 15000);
</script>
</body>
</html>
